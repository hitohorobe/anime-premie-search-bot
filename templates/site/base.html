<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}アニメ先行上映・先行配信情報{% endblock %}</title>
  <link rel="alternate" type="application/rss+xml" title="RSS" href="feed.xml">
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
    h1 { font-size: 1.4rem; }
    .event { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .event h2 { margin: 0 0 0.5rem; font-size: 1.1rem; }
    .session { margin: 0.25rem 0; }
    .reservation { margin-top: 0.5rem; font-size: 0.9rem; color: #555; }
    a { color: #1a6fb0; }
    .filters { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .filters label { font-size: 0.9rem; }
    .filters input[type="date"] { margin-left: 0.25rem; }
    .filters button { cursor: pointer; }
    .pagination { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1.5rem 0; }
    .pagination button { cursor: pointer; }
    .pagination button[disabled] { font-weight: bold; cursor: default; }
  </style>
</head>
<body>
  <h1><a href="index.html">アニメ先行上映・先行配信情報</a></h1>
  {% block content %}{% endblock %}
  <p><a href="feed.xml">RSSフィード</a></p>
</body>
</html>
